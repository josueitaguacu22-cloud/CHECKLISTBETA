<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Tratos - V128 (Supervisora Autônoma) 🤖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #1e1e2f; 
            background-position: center; 
            background-size: cover; 
            background-attachment: fixed; 
            color: #fff; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            transition: background 1s ease; 
        }
        .backdrop-fundo { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(15, 15, 25, 0.85); 
            z-index: -1; 
        }
        .container { 
            background: rgba(42, 42, 64, 0.85); 
            padding: 25px; 
            border-radius: 15px; 
            width: 100%; 
            max-width: 600px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.6); 
            backdrop-filter: blur(8px); 
            border: 1px solid rgba(255,255,255,0.1); 
            z-index: 1;
        }
        h2 { 
            border-bottom: 2px solid #00ffcc; 
            padding-bottom: 10px; 
            color: #00ffcc; 
            text-align: center; 
            text-transform: uppercase; 
            margin-top: 0; 
        }
        input[type="file"] { 
            display: block; 
            margin: 20px 0; 
            background: rgba(58, 58, 80, 0.8); 
            padding: 15px; 
            border-radius: 8px; 
            width: 94%; 
            border: 1px dashed #00ffcc; 
            color: #fff; 
            cursor: pointer;
        }
        .btn-gerar { 
            background: linear-gradient(135deg, #4CAF50, #2E7D32); 
            width: 100%; 
            font-size: 18px; 
            margin-bottom: 15px; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3); 
        }
        .botoes-acao { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
        }
        .botoes-acao button { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            border-radius: 6px; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
        }
        .btn-wpp { background-color: #25D366; }
        .btn-teams { background-color: #6264A7; }

        #blocoDicionario { display: none; width: 100%; margin-bottom: 20px; }
        .galeria-titulo { font-size: 14px; color: #ff9800; text-align: center; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #4a4a6a; padding-bottom: 5px; }
        .categorias-container { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; }
        .btn-cat { flex: 1; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #btnCatTratos { background: linear-gradient(135deg, #ff9800, #e65100); }
        #btnCatCtt { background: linear-gradient(135deg, #2196F3, #1565C0); }
        
        .galeria-grid { display: none; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid #4a4a6a; }
        .btn-dic { background: rgba(255, 255, 255, 0.1); border: 1px solid #00ffcc; color: #00ffcc; padding: 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.3s; text-align: center; }
        .btn-dic:hover { background: rgba(0, 255, 204, 0.2); transform: translateY(-2px); }

        #resultado { 
            background-color: rgba(20, 20, 30, 0.9); 
            padding: 20px; 
            border-radius: 8px; 
            white-space: pre-wrap; 
            font-family: 'Consolas', monospace; 
            font-size: 14px; 
            border: 1px solid #4a4a6a; 
            min-height: 100px; 
        }

        #modalViewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        #viewerTitle { color: #00ffcc; font-size: 24px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; text-align: center; padding: 0 10px; }
        #imgDisplay { max-width: 90%; max-height: 45vh; border: 2px solid #00ffcc; border-radius: 10px; box-shadow: 0 0 20px rgba(0,255,204,0.3); display: none; }
        #viewerDesc { background: rgba(255, 152, 0, 0.1); color: #fff; padding: 25px; border-radius: 10px; border: 1px dashed #ff9800; margin-top: 15px; max-width: 85%; text-align: center; line-height: 1.6; font-size: 16px; display: none; }
        .botoes-modal-viewer { display: flex; gap: 15px; margin-top: 25px; }
        .botoes-modal-viewer button { padding: 12px 25px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
<div class="backdrop-fundo"></div>

<div class="container">
    <h2>Checklist Tratos</h2>
    
    <div id="blocoDicionario">
        <div class="galeria-titulo">📖 Dicionário de Operações</div>
        <div class="categorias-container">
            <button id="btnCatTratos" class="btn-cat" onclick="renderizarGaleria('tratos')">🚜 TRATOS</button>
            <button id="btnCatCtt" class="btn-cat" onclick="renderizarGaleria('ctt')">🚛 CTT</button>
        </div>
        <div class="galeria-grid" id="gridDicionario"></div>
    </div>

    <input type="file" id="fileUpload" accept=".xlsx, .xls, .xlsm" />
    <button class="btn-gerar" onclick="processarPlanilha()">GERAR CHECKLIST</button>
    
    <div class="botoes-acao">
        <button class="btn-wpp" onclick="copiarWhatsApp()">Copiar WhatsApp</button>
        <button class="btn-teams" onclick="copiarTeams()">Copiar Teams</button>
    </div>

    <div id="resultado">Aguardando importação da planilha...</div>
</div>

<div id="modalViewer">
    <h3 id="viewerTitle"></h3>
    <img id="imgDisplay" src="" />
    <div id="viewerDesc"></div>
    <div class="botoes-modal-viewer">
        <button id="btnInfo" style="background:#2196F3; color:white;" onclick="toggleInfo()">💡 Mais Informações</button>
        <button style="background:#ff4444; color:white;" onclick="fecharFoto()">❌ Fechar</button>
    </div>
</div>

<script>
    // BLINDAGEM MÁXIMA
    function safeIncludes(target, search) {
        if (target === undefined || target === null) return false;
        let s = String(search).toUpperCase().trim();
        if (s === "") return false; 
        if (Array.isArray(target)) {
            return target.some(item => String(item).toUpperCase().includes(s));
        }
        return String(target).toUpperCase().includes(s);
    }

    const dictInfo = {
        "TRATOS": { titulo: "Tratos Culturais", desc: "Conjunto de práticas e cuidados agrícolas." },
        "VINHACA_LOC": { titulo: "Vinhaça Localizada", desc: "Aplicação direcionada de vinhaça." },
        "LOMBO": { titulo: "Q/Lombo", desc: "Operação de nivelamento do solo." },
        "MINERAL": { titulo: "Cultivo Mineral", desc: "Aplicação de fertilizantes sintéticos/minerais." },
        "SOQUEIRA": { titulo: "Corte Soqueira", desc: "Operação que corta o solo e as raízes da cana." },
        "COMPOSTO": { titulo: "Composto", desc: "Aplicação de adubo orgânico." },
        "UNIPORT": { titulo: "Herbicida Uniport", desc: "Pulverizador Autopropelido Uniport." },
        "HERBPLUS": { titulo: "Herbicida Herbplus", desc: "Implemento tratorizado Herbplus." },
        "CORRETIVO": { titulo: "Corretivo", desc: "Insumos para corrigir a acidez do solo." },
        "CANAL": { titulo: "Vinhaça Canal", desc: "Sistema de canais para conduzir a vinhaça." },
        "BOMBA": { titulo: "Moto Bomba", desc: "Equipamento de bombeamento." },
        "ROLL": { titulo: "Hidro Roll", desc: "Carretel enrolador móvel." },
        "CTT": { titulo: "Módulo CTT", desc: "Corte, Transbordo e Transporte." },
        "COLHEDORA": { titulo: "Colhedora", desc: "Máquina responsável pela etapa do corte." },
        "TRANSBORDO": { titulo: "Transbordo", desc: "Trator tracionando caixas basculantes." },
        "TRANSPORTE": { titulo: "Transporte de Cana", desc: "Caminhões pesados de frete." }
    };

    const categoriasMenu = {
        tratos: ["TRATOS", "VINHACA_LOC", "LOMBO", "MINERAL", "SOQUEIRA", "COMPOSTO", "UNIPORT", "HERBPLUS", "CORRETIVO", "CANAL", "BOMBA", "ROLL"],
        ctt: ["CTT", "COLHEDORA", "TRANSBORDO", "TRANSPORTE"]
    };

    let fotos = {}; 
    let categoriaAberta = null;

    function renderizarGaleria(cat) {
        const grid = document.getElementById('gridDicionario');
        if (categoriaAberta === cat) {
            grid.style.display = 'none';
            categoriaAberta = null;
            return;
        }
        categoriaAberta = cat;
        grid.innerHTML = '';
        grid.style.display = 'grid'; 
        categoriasMenu[cat].forEach(key => {
            if (dictInfo[key]) {
                let btn = document.createElement('button');
                btn.className = 'btn-dic';
                btn.innerText = dictInfo[key].titulo;
                btn.onclick = () => abrirFotoInfo(key);
                grid.appendChild(btn);
            }
        });
    }

    function abrirFotoInfo(key) {
        const data = dictInfo[key];
        document.getElementById('viewerTitle').innerText = data.titulo;
        document.getElementById('viewerDesc').innerText = data.desc;
        const imgEl = document.getElementById('imgDisplay');
        const descEl = document.getElementById('viewerDesc');
        const btnInfo = document.getElementById('btnInfo');

        if (key === 'TRATOS' || key === 'CTT') {
            descEl.style.display = 'block'; 
            imgEl.style.display = 'none'; 
            btnInfo.style.display = 'none';
        } else {
            descEl.style.display = 'none'; 
            btnInfo.style.display = 'block';
            if (fotos[key]) { 
                imgEl.src = fotos[key]; 
                imgEl.style.display = 'block'; 
            } else { 
                imgEl.style.display = 'none'; 
            }
        }
        document.getElementById('modalViewer').style.display = 'flex';
    }

    function fecharFoto() { 
        document.getElementById('modalViewer').style.display = 'none'; 
    }
    
    function toggleInfo() {
        const desc = document.getElementById('viewerDesc');
        if (desc.style.display === 'none') {
            desc.style.display = 'block';
        } else {
            desc.style.display = 'none';
        }
    }

    async function askHerbicidaType(machineId) {
        return new Promise((resolve) => {
            const div = document.createElement('div');
            div.style = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:10000;";
            div.innerHTML = `
                <div style="background:#2a2a40;padding:30px;border-radius:10px;width:90%;max-width:450px;text-align:center;border:2px solid #00ffcc;">
                    <p style="margin-bottom:10px;font-weight:bold;color:#00ffcc;font-size:18px;">SELECIONE O TIPO</p>
                    <p style="margin-bottom:20px;font-size:20px;color:#fff;">Máquina Ativa: <b>${machineId}</b></p>
                    <div style="display:flex;gap:15px;margin-bottom:20px;">
                        <button id="btnUni" style="background:linear-gradient(135deg, #2196F3, #1565C0);flex:1;padding:20px;color:white;font-weight:bold;border:none;border-radius:8px;font-size:16px;cursor:pointer;">🚜 UNIPORT</button>
                        <button id="btnHerb" style="background:linear-gradient(135deg, #ff9800, #e65100);flex:1;padding:20px;color:white;font-weight:bold;border:none;border-radius:8px;font-size:16px;cursor:pointer;">⚙️ HERBPLUS</button>
                    </div>
                    <input type="text" id="manualInp" placeholder="Ou digite outro manualmente..." style="width:90%;padding:12px;margin-bottom:15px;border-radius:5px;background:#1e1e2f;color:#fff;border:1px solid #4a4a6a;">
                    <button id="btnManual" style="background:#4CAF50;color:#fff;padding:12px;width:100%;border:none;border-radius:5px;font-weight:bold;cursor:pointer;">Confirmar Manual</button>
                </div>
            `;
            document.body.appendChild(div);
            
            const close = (res) => { 
                document.body.removeChild(div); 
                resolve(res); 
            };
            
            document.getElementById('btnUni').onclick = () => close("UNIPORT");
            document.getElementById('btnHerb').onclick = () => close("HERBPLUS");
            document.getElementById('btnManual').onclick = () => close(document.getElementById('manualInp').value.trim());
        });
    }

    async function askDynamicForm(tipo) {
        return new Promise((resolve) => {
            const overlay = document.createElement('div');
            overlay.style = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:9999;";
            const isMudanca = tipo === 'mudancas';
            const title = isMudanca ? "MUDANÇAS DE FRENTE" : "CHAMADOS TECNOLOGIA";

            overlay.innerHTML = `
                <div style="background:#2a2a40;padding:25px;border-radius:10px;width:95%;max-width:500px;max-height:85vh;overflow-y:auto;border:1px solid #ff9800;text-align:center;">
                    <h3 style="color:#ff9800;margin-top:0;">${title}</h3>
                    <div id="dynamicList"></div>
                    <button id="btnAdd" style="background:rgba(33, 150, 243, 0.2);border:1px dashed #2196F3;color:#2196F3;padding:12px;margin:10px 0;width:100%;border-radius:5px;cursor:pointer;font-weight:bold;">➕ ADICIONAR OUTRO</button>
                    <button id="btnSave" style="background:#4CAF50;color:#fff;padding:15px;width:100%;border-radius:5px;border:none;cursor:pointer;font-weight:bold;margin-bottom:10px;">💾 CONFIRMAR TODOS</button>
                    <button id="btnSkip" style="background:#ff4444;color:#fff;padding:12px;width:100%;border-radius:5px;border:none;cursor:pointer;font-weight:bold;">NENHUM (Pular)</button>
                </div>
            `;
            document.body.appendChild(overlay);

            const list = document.getElementById('dynamicList');
            let count = 0;

            function addRow() {
                count++;
                const row = document.createElement('div');
                row.style = "background:#1e1e2f;padding:20px 15px 15px 15px;border-radius:8px;margin-bottom:15px;border:1px solid #4a4a6a;position:relative;text-align:left;";
                
                let inps = "";
                if (isMudanca) {
                    inps = `
                        <input type="text" class="inp-1" placeholder="Quem Solicitou?" style="width:94%;margin:5px 0;padding:10px;border-radius:5px;background:#2a2a40;color:#fff;border:1px solid #4a4a6a;">
                        <input type="text" class="inp-2" placeholder="Qual a Frota?" style="width:94%;margin:5px 0;padding:10px;border-radius:5px;background:#2a2a40;color:#fff;border:1px solid #4a4a6a;">
                        <input type="text" class="inp-3" placeholder="Frente Destino?" style="width:94%;margin:5px 0;padding:10px;border-radius:5px;background:#2a2a40;color:#fff;border:1px solid #4a4a6a;">
                    `;
                } else {
                    inps = `
                        <input type="text" class="inp-1" placeholder="Qual a Frota?" style="width:94%;margin:5px 0;padding:10px;border-radius:5px;background:#2a2a40;color:#fff;border:1px solid #4a4a6a;">
                        <input type="date" class="inp-2" style="width:94%;margin:5px 0;padding:10px;border-radius:5px;background:#2a2a40;color:#fff;border:1px solid #4a4a6a;">
                        <input type="time" class="inp-3" style="width:94%;margin:5px 0;padding:10px;border-radius:5px;background:#2a2a40;color:#fff;border:1px solid #4a4a6a;">
                    `;
                }

                row.innerHTML = `<span style="position:absolute;top:-10px;left:15px;background:#ff9800;color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:bold;">Registro ${count}</span>${inps}`;
                list.appendChild(row);
            }
            
            addRow();

            document.getElementById('btnAdd').onclick = addRow;
            
            document.getElementById('btnSkip').onclick = () => { 
                document.body.removeChild(overlay); 
                resolve([]); 
            };
            
            document.getElementById('btnSave').onclick = () => {
                const results = [];
                for (let r of list.children) {
                    let v1 = r.querySelector('.inp-1').value.trim();
                    let v2 = r.querySelector('.inp-2').value.trim();
                    let v3 = r.querySelector('.inp-3').value.trim();
                    
                    if (v1 || v2 || v3) {
                        if (isMudanca) {
                            results.push(`${v1 || "N/A"} - ${v2 || "N/A"} - ${(v3 || "N/A").toUpperCase()}`);
                        } else {
                            let dt = v2 ? v2.split('-').reverse().join('/') : "N/A";
                            let hr = v3 || "00:00";
                            results.push(`${v1 || "N/A"} - ${dt} ${hr}`);
                        }
                    }
                }
                document.body.removeChild(overlay);
                resolve(results);
            };
        });
    }

    async function askObsForm() {
        return new Promise((resolve) => {
            const overlay = document.createElement('div');
            overlay.style = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:9999;";

            overlay.innerHTML = `
                <div style="background:#2a2a40;padding:25px;border-radius:10px;width:95%;max-width:500px;border:1px solid #ff9800;text-align:center;">
                    <h3 style="color:#ff9800;margin-top:0;">HÁ OBSERVAÇÕES?</h3>
                    <textarea id="obsText" rows="4" placeholder="Digite as observações aqui..." style="width:94%;margin:10px 0;padding:10px;border-radius:5px;background:#1e1e2f;color:#fff;border:1px solid #4a4a6a;resize:vertical;font-family:inherit;"></textarea>
                    <button id="btnSaveObs" style="background:#4CAF50;color:#fff;padding:15px;width:100%;border-radius:5px;border:none;cursor:pointer;font-weight:bold;margin-bottom:10px;">💾 CONFIRMAR</button>
                    <button id="btnSkipObs" style="background:#ff4444;color:#fff;padding:12px;width:100%;border-radius:5px;border:none;cursor:pointer;font-weight:bold;">NENHUMA (Pular)</button>
                </div>
            `;
            document.body.appendChild(overlay);

            document.getElementById('btnSkipObs').onclick = () => { 
                document.body.removeChild(overlay); 
                resolve(""); 
            };
            
            document.getElementById('btnSaveObs').onclick = () => {
                const val = document.getElementById('obsText').value.trim();
                document.body.removeChild(overlay);
                resolve(val);
            };
        });
    }

    const normalizeStr = (str) => {
        if (!str) return "";
        return String(str).toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^A-Z0-9]/g, "");
    };

    async function extrairFotosConfig(file) {
        try {
            const zip = await JSZip.loadAsync(file);
            const wbXml = await zip.file("xl/workbook.xml").async("text");
            const sMatch = wbXml.match(/<sheet [^>]*name="CONFIG"[^>]*sheetId="(\d+)"[^>]*r:id="(rId\d+)"/i);
            
            if (!sMatch) return;
            
            const wbRels = await zip.file("xl/_rels/workbook.xml.rels").async("text");
            const relTarget = wbRels.match(new RegExp(`Id="${sMatch[2]}"[^>]*Target="([^"]+)"`))[1];
            
            const sRelsPath = "xl/" + relTarget.replace("worksheets/", "worksheets/_rels/") + ".rels";
            const sRelsXml = await zip.file(sRelsPath).async("text");
            
            const dMatch = sRelsXml.match(/Target="..\/drawings\/([^"]+)"/);
            if (!dMatch) return;
            
            const dPath = "xl/drawings/" + dMatch[1];
            const dRelsPath = "xl/drawings/_rels/" + dMatch[1] + ".rels";
            
            const dXml = await zip.file(dPath).async("text");
            const dRelsXml = await zip.file(dRelsPath).async("text");
            
            const xmlDoc = new DOMParser().parseFromString(dXml, "text/xml");
            const pics = xmlDoc.getElementsByTagName("xdr:pic");
            
            for (let pic of pics) {
                const nameNode = pic.getElementsByTagName("xdr:cNvPr")[0];
                if (!nameNode) continue;
                
                const rawName = nameNode.getAttribute("name");
                const normName = normalizeStr(rawName);
                const rId = pic.getElementsByTagName("a:blip")[0].getAttribute("r:embed");
                
                const imgPath = dRelsXml.match(new RegExp(`Id="${rId}"[^>]*Target="..\/media\/([^"]+)"`))[1];
                const url = URL.createObjectURL(await zip.file("xl/media/" + imgPath).async("blob"));
                
                for (let key in dictInfo) {
                    if (safeIncludes(normName, normalizeStr(dictInfo[key].titulo)) || safeIncludes(normName, key)) {
                        fotos[key] = url;
                    }
                }
            }
        } catch (e) { 
            console.log("Imagens ignoradas."); 
        }
    }

    function parseSafeDate(val) {
        if (val === undefined || val === null || val === "") return null;
        let obj = null;
        let str = "";

        if (typeof val === 'number') {
            if (val > 1 && (val < 44900 || val > 48000)) return null; 
            
            let baseDate = new Date();
            if (val >= 44900 && val <= 48000) {
                let utc_days  = Math.floor(val - 25569);
                let date_info = new Date(utc_days * 86400 * 1000);
                baseDate = new Date(date_info.getUTCFullYear(), date_info.getUTCMonth(), date_info.getUTCDate());
            }
            
            let fraction = val - Math.floor(val);
            if (fraction > 0.00001) {
                let total_seconds = Math.round(fraction * 86400);
                baseDate.setHours(Math.floor(total_seconds / 3600), Math.floor((total_seconds % 3600) / 60), 0, 0);
            } else if (val >= 44900) {
                baseDate.setHours(0, 0, 0, 0);
            }
            obj = baseDate;
            
        } else {
            let s = String(val).replace(/[\u200B-\u200D\uFEFF]/g, '').trim();
            if (s.split('.').length > 2) return null; 
            
            let dateMatch = s.match(/(?:^|\s)(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
            let timeMatch = s.match(/(?:^|\s)(\d{1,2})[:hH](\d{2})/);

            if (!dateMatch && !timeMatch) return null;
            
            let now = new Date();
            let yr = now.getFullYear();
            let mo = now.getMonth();
            let dy = now.getDate();
            let hr = 0;
            let mi = 0;
            
            if (dateMatch) {
                dy = parseInt(dateMatch[1], 10);
                mo = parseInt(dateMatch[2], 10) - 1;
                yr = parseInt(dateMatch[3], 10);
                if (yr < 100) yr += 2000;
                if (yr < 2023 || yr > 2030) return null; 
            }
            
            if (timeMatch) {
                hr = parseInt(timeMatch[1], 10);
                mi = parseInt(timeMatch[2], 10);
            }

            if (dateMatch && timeMatch) {
                obj = new Date(yr, mo, dy, hr, mi);
            } else if (dateMatch) {
                obj = new Date(yr, mo, dy, 0, 0, 0, 0);
            } else if (timeMatch) {
                obj = new Date();
                obj.setHours(hr, mi, 0, 0);
            }
        }

        if (obj) {
            let d = obj.getDate().toString().padStart(2, '0');
            let m = (obj.getMonth() + 1).toString().padStart(2, '0');
            let y = obj.getFullYear().toString().slice(-2);
            let h = obj.getHours().toString().padStart(2, '0');
            let min = obj.getMinutes().toString().padStart(2, '0');
            
            if (val > 1 || safeIncludes(String(val), '/')) {
                str = d + '/' + m + '/' + y + ' ' + h + ':' + min;
            } else {
                str = h + ':' + min;
            }
            
            return { obj: obj, str: str };
        }
        return null;
    }

    function processarPlanilha() {
        const fileUpload = document.getElementById('fileUpload');
        if (!fileUpload.files[0]) return alert("Selecione a planilha!");
        
        const file = fileUpload.files[0];
        const reader = new FileReader();
        document.getElementById('resultado').innerText = "Iniciando Varredura Autônoma V128... 🚀";

        reader.onload = async (e) => {
            await extrairFotosConfig(file);
            
            if (fotos["UNIPORT"]) {
                document.body.style.backgroundImage = "url('" + fotos["UNIPORT"] + "')";
            }

            setTimeout(async () => {
                try {
                    const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array', cellFormula: false, cellHTML: false});
                    document.getElementById('blocoDicionario').style.display = 'block';

                    let fData = {};
                    let cMap = {};
                    
                    let frentesTurno = new Set();
                    let frentesChuva = new Set();

                    const keywords = ["HERBICIDA", "CULTIVO", "COMPOSTO", "CORRETIVO", "VINHAÇA", "VINHACA", "LOCALIZADA", "QUEBRA LOMBO", "TRANSP", "SOQUEIRA"];
                    const now = new Date();

                    let pMap = {};
                    // V83 ORIGINAL: Construção do pMap (aba Paradas)
                    for (let sn of workbook.SheetNames) {
                        let nameUpper = sn.toUpperCase();
                        if (safeIncludes(nameUpper, "PARADA") || safeIncludes(nameUpper, "QUADRO") || safeIncludes(nameUpper, "STATUS") || safeIncludes(nameUpper, "MECANICA") || safeIncludes(nameUpper, "MANUT") || safeIncludes(nameUpper, "OFICINA")) {
                            let pRows = XLSX.utils.sheet_to_json(workbook.Sheets[sn], {header: 1});
                            for (let r = 0; r < pRows.length; r++) {
                                let rw = pRows[r];
                                if (!rw || rw.length === 0) continue;

                                let frota = null;
                                let frotaCol = -1;

                                for (let c = 0; c < rw.length; c++) {
                                    let m = String(rw[c]||"").trim().match(/\b(\d{4,6})\b/);
                                    if (m && String(rw[c]).trim().length < 10) { 
                                        frota = m[1]; 
                                        frotaCol = c; 
                                        break; 
                                    }
                                }

                                if (frota) {
                                    let dStr = null;
                                    let pReason = null;
                                    for (let c = 0; c < rw.length; c++) {
                                        if (c === frotaCol) continue;
                                        let cellVal = rw[c];
                                        if (cellVal === undefined || cellVal === null || cellVal === "") continue;

                                        let p = parseSafeDate(cellVal);
                                        if (p) {
                                            if (!dStr) dStr = p.str;
                                            if (safeIncludes(p.str, '/')) dStr = p.str;
                                        } else {
                                            let textVal = String(cellVal).toUpperCase().trim();
                                            if (textVal.length > 3 && !safeIncludes(textVal, "FROTA") && !safeIncludes(textVal, "EQUIP") && !safeIncludes(textVal, "DATA") && !safeIncludes(textVal, "HORA") && !safeIncludes(textVal, "MINUTO")) {
                                                if (!pReason) pReason = textVal;
                                            }
                                        }
                                    }
                                    pMap[frota] = { time: dStr || "", reason: pReason || "" };
                                }
                            }
                        }
                    }

                    for (let sn of workbook.SheetNames) {
                        let snUpper = sn.toUpperCase();
                        
                        // IGNORA AS ABAS DE PARADAS PARA NÃO REPETIR
                        if (safeIncludes(snUpper, "PARADA") || safeIncludes(snUpper, "MECANICA") || safeIncludes(snUpper, "MANUT") || safeIncludes(snUpper, "OFICINA") || safeIncludes(snUpper, "CONFIG") || safeIncludes(snUpper, "DADOS") || safeIncludes(snUpper, "TABELA")) continue;
                        
                        const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sn], {header: 1});
                        
                        let textScan = snUpper + " ";
                        for (let i = 0; i < Math.min(30, rows.length); i++) if (rows[i]) textScan += rows[i].join(" ").toUpperCase() + " ";
                        
                        let unit = "VER";
                        if (safeIncludes(textScan, "MANDU") || safeIncludes(textScan, "MAN -") || safeIncludes(textScan, "UIM")) unit = "MAN";
                        else if (safeIncludes(textScan, "SÃO JOSÉ") || safeIncludes(textScan, "SJO -") || safeIncludes(textScan, "UISJ")) unit = "SJO";
                        else if (safeIncludes(textScan, "ANDRADE") || safeIncludes(textScan, "AND -") || safeIncludes(textScan, "UIA")) unit = "AND";
                        else if (safeIncludes(textScan, "CRUZ ALTA") || safeIncludes(textScan, "CRZ") || safeIncludes(textScan, "UICA")) unit = "CRZ";
                        else if (safeIncludes(textScan, "TANABI") || safeIncludes(textScan, "TAN -") || safeIncludes(textScan, "UIT")) unit = "TAN";

                        for (let r = 0; r < rows.length; r++) {
                            if (!rows[r]) continue;
                            
                            for (let c = 0; c < rows[r].length; c++) {
                                let cell = String(rows[r][c]).toUpperCase().trim();
                                
                                if (keywords.some(k => safeIncludes(cell, k))) {
                                    
                                    let isOfc = safeIncludes(cell, "OFICINA") || safeIncludes(cell, "OFC");
                                    if (isOfc) continue; 
                                    
                                    let b = "N/A";
                                    let os = "N/A";
                                    
                                    let startR = -1;
                                    let cEquip = -1, cImpl = -1, cStatus = -1, cUCom = -1;

                                    for (let s = r + 1; s < r + 6; s++) {
                                        if (!rows[s]) continue;
                                        let rowStr = rows[s].map(x => String(x||"").toUpperCase().trim());
                                        cEquip = rowStr.findIndex((x, idx) => idx >= Math.max(0, c - 2) && (safeIncludes(x, "EQUIP") || safeIncludes(x, "FROTA")));
                                        
                                        if (cEquip !== -1) {
                                            startR = s + 1;
                                            cImpl = rowStr.findIndex((x, idx) => idx >= cEquip && (safeIncludes(x, "IMPLEMENTO") || safeIncludes(x, "IMPL")));
                                            cStatus = rowStr.findIndex((x, idx) => idx >= cEquip && (safeIncludes(x, "STATUS") || safeIncludes(x, "MOTIVO") || safeIncludes(x, "ESTADO") || safeIncludes(x, "PROBLEMA")));
                                            cUCom = rowStr.findIndex((x, idx) => idx >= cEquip && (safeIncludes(x, "U. COMUNICA") || safeIncludes(x, "ULTIMA COM") || safeIncludes(x, "LTIMA COM") || safeIncludes(x, "ATUALIZA") || safeIncludes(x, "CONEX")));
                                            break;
                                        }
                                    }
                                    
                                    if (startR === -1 || cEquip === -1) continue;

                                    // A MURALHA ANTI-ROUBO (Fix do N/A da foto)
                                    for (let scanRow = Math.max(0, startR - 4); scanRow < startR; scanRow++) {
                                        if (!rows[scanRow]) continue;
                                        
                                        let maxCol = cEquip + 3; // Limite de 3 colunas
                                        for (let scanCol = Math.max(0, cEquip - 2); scanCol <= maxCol; scanCol++) {
                                            let cellText = String(rows[scanRow][scanCol] || "").toUpperCase().trim();
                                            if (cellText === "") continue;

                                            if (safeIncludes(cellText, "BLOCO") && b === "N/A") {
                                                let mB = cellText.match(/BLOCO\s*[:\-]?\s*([A-Z0-9]+)/);
                                                if (mB && mB[1] && mB[1] !== "BLOCO") {
                                                    b = mB[1].trim();
                                                } else {
                                                    for (let n = 1; n <= 3; n++) {
                                                        if (scanCol + n > maxCol) break;
                                                        let nextVal = String(rows[scanRow][scanCol + n] || "").trim();
                                                        if (nextVal !== "") { b = nextVal; break; }
                                                    }
                                                }
                                            }
                                            
                                            if ((cellText === "O.S." || cellText === "O.S" || cellText === "OS" || cellText.startsWith("O.S") || cellText.startsWith("OS")) && os === "N/A") {
                                                let mO = cellText.match(/O\.?S\.?\s*[:\-]?\s*([A-Z0-9\/\s]+)/);
                                                if (mO && mO[1] && mO[1].trim() !== "OS" && mO[1].trim() !== "O.S.") {
                                                    os = mO[1].trim();
                                                } else {
                                                    for (let n = 1; n <= 3; n++) {
                                                        if (scanCol + n > maxCol) break;
                                                        let nextVal = String(rows[scanRow][scanCol + n] || "").trim();
                                                        if (nextVal !== "") { os = nextVal; break; }
                                                    }
                                                }
                                            }
                                        }
                                    }
                                    
                                    let numFrente = "1"; 
                                    if (safeIncludes(cell, "HERBICIDA")) {
                                        let txtFrente = (String(rows[r][c] || "") + " " + String(rows[r][c+1] || "")).toUpperCase();
                                        let m = txtFrente.match(/HERBICIDA\s*[\-\:]?\s*(\d+)/);
                                        if (m && m[1]) numFrente = m[1];
                                    }

                                    let nameRaw = safeIncludes(cell, "HERBICIDA") ? "HERBICIDA - " + numFrente : 
                                                  safeIncludes(cell, "CULTIVO MINERAL") ? "CULTIVO MINERAL" : 
                                                  (safeIncludes(cell, "CULTIVO") || safeIncludes(cell, "QUEBRA LOMBO")) ? "CULTIVO / Q LOMBO" : 
                                                  safeIncludes(cell, "COMPOSTO") ? cell : 
                                                  safeIncludes(cell, "TRANSP") ? "TRANSP DE VINHAÇA" : 
                                                  safeIncludes(cell, "SOQUEIRA") ? "CORTE SOQUEIRA" : cell;
                                                  
                                    let name = unit + " - " + nameRaw;

                                    // LER O STATUS DA FRENTE (No Cabeçalho)
                                    let statusFrente = "";
                                    for (let j = 1; j <= 5; j++) {
                                        if (rows[r][c+j]) statusFrente += String(rows[r][c+j]) + " ";
                                    }
                                    statusFrente = statusFrente.toUpperCase();

                                    let isFrontTurno = safeIncludes(statusFrente, "TURNO S. OPERA") || safeIncludes(statusFrente, "TURNO SEM OPERA") || safeIncludes(statusFrente, "TURNO S OPERA");
                                    let isFrontChuva = safeIncludes(statusFrente, "CHUVA") || safeIncludes(statusFrente, "UMIDO") || safeIncludes(statusFrente, "ÚMIDO");
                                    
                                    if (!fData[name]) {
                                        fData[name] = { 
                                            name: name, 
                                            nameRaw: nameRaw, 
                                            blocks: [], 
                                            seenFrotas: new Set(),
                                            isTurno: isFrontTurno,
                                            isChuva: isFrontChuva,
                                            skipPrint: false
                                        };
                                    }
                                    
                                    let curBlk = { b: b, os: os, acts: [], stps: [] };

                                    let dr = startR;
                                    let blankCount = 0;
                                    
                                    // Limite de profundidade para cortar o Lixo do Excel
                                    while (dr < rows.length && dr < startR + 30) {
                                        let rowData = rows[dr];
                                        
                                        if (!rowData || String(rowData.join("")).trim() === "") { 
                                            blankCount++;
                                            if (blankCount >= 3) break;
                                            dr++; continue; 
                                        }

                                        let rowTextRaw = normalizeStr(rowData.join(" "));
                                        if (safeIncludes(rowTextRaw, "OBSERVA") || safeIncludes(rowTextRaw, "OBS:") || /(^|\s)OBS($|\s)/.test(rowTextRaw)) {
                                            break;
                                        }
                                        
                                        let frota = null;
                                        let baseC = cEquip;
                                        
                                        for (let k = 0; k <= 2; k++) {
                                            let cellText = String(rowData[cEquip+k] || "").trim();
                                            let mMatch = cellText.match(/\b(\d{4,6})\b/);
                                            if (mMatch) { 
                                                frota = mMatch[1]; 
                                                baseC = cEquip+k;
                                                break; 
                                            }
                                        }

                                        if (!frota) { 
                                            blankCount++;
                                            if (blankCount >= 3) break;
                                            
                                            let rowText = rowData.join(" ").toUpperCase();
                                            if (safeIncludes(rowText, "TOTAL") || safeIncludes(rowText, "RESUMO") || safeIncludes(rowText, "MECANICA") || safeIncludes(rowText, "OFICINA") || safeIncludes(rowText, "PARADA")) {
                                                break;
                                            }
                                            dr++; continue; 
                                        }
                                        
                                        blankCount = 0; 
                                        
                                        // O CORTA-GIRO DO EXCEL
                                        if (frota.length > 6) { dr++; continue; }

                                        if (fData[name].seenFrotas.has(frota)) { dr++; continue; }
                                        fData[name].seenFrotas.add(frota);
                                        
                                        let mImpl = String(rowData[baseC+1] || frota).match(/^\d+/);
                                        let impl = mImpl ? mImpl[0] : frota;
                                        let stUpper = cStatus !== -1 ? String(rowData[cStatus] || "").toUpperCase().trim() : "";
                                        if (cStatus === -1) stUpper = String(rowData[baseC+2] || "").toUpperCase().trim();

                                        // O CORTA-GIRO DE STATUS "46129.69"
                                        if (/^\d{5,}\.\d{4,}$/.test(stUpper)) {
                                            break;
                                        }

                                        let uComVal = cUCom !== -1 ? rowData[cUCom] : null;

                                        let infoParada = "";
                                        let reasonParada = "";
                                        if (pMap[frota]) {
                                            infoParada = pMap[frota].time ? " - " + pMap[frota].time : "";
                                            reasonParada = pMap[frota].reason;
                                        }
                                        
                                        if (!infoParada && uComVal) {
                                            let pDate = parseSafeDate(uComVal);
                                            if(pDate && safeIncludes(pDate.str, '/')) infoParada = " - " + pDate.str;
                                        }
                                        
                                        let isOffline = false;
                                        let lastConnText = "";

                                        let parsed = parseSafeDate(uComVal);
                                        if (parsed && parsed.obj) {
                                            let diffHrs = (now - parsed.obj) / 3600000;
                                            if (diffHrs < -12) diffHrs += 24; 
                                            
                                            if (diffHrs >= 4) {
                                                isOffline = true;
                                                lastConnText = parsed.str;
                                            }
                                        } else if (uComVal) {
                                            let valStr = String(uComVal).toUpperCase().trim();
                                            if (safeIncludes(valStr, "SEM SINAL") || safeIncludes(valStr, ">4H") || safeIncludes(valStr, "OFF")) {
                                                isOffline = true;
                                                lastConnText = valStr;
                                            }
                                        }

                                        if (isOffline) {
                                            cMap[frota] = frota + " " + unit + " - " + nameRaw + " - " + (lastConnText || "Sem sinal");
                                        }

                                        let isTransp = safeIncludes(nameRaw, "TRANSP"); 
                                        let textoImplemento = (isTransp || impl === frota) ? "" : " - " + impl;

                                        let finalReason = stUpper;
                                        if (!finalReason || finalReason === "") finalReason = reasonParada;

                                        let isMudancaStatus = safeIncludes(finalReason, "MUDANÇA") || safeIncludes(finalReason, "MUDANCA");
                                        let isActive = false;

                                        // A SOBERANIA DO ATIVO V113 ✅ (Corrige a ausência do Herbicida)
                                        let isExplicitlyActive = safeIncludes(stUpper, "ATIVO") || safeIncludes(stUpper, "TRABALHANDO") || stUpper === "OK" || safeIncludes(stUpper, "PROPRIO");

                                        if (stUpper === "" || isExplicitlyActive) {
                                            isActive = true;
                                        }
                                        if (stUpper !== "" && (safeIncludes(stUpper, "OFF") || safeIncludes(stUpper, "DESATUALIZADO") || safeIncludes(stUpper, ">4H") || safeIncludes(stUpper, "+4H"))) {
                                            isActive = false;
                                        }
                                        
                                        if (pMap[frota] && !isMudancaStatus && !isExplicitlyActive) {
                                            isActive = false; 
                                        }

                                        if (isMudancaStatus) {
                                            let txtMud = finalReason ? finalReason.replace("VENTO FORTE","EXCESSO DE VENTO") : "MUDANÇA DE FRENTE";
                                            curBlk.acts.push("🟡 " + frota + textoImplemento + " - " + txtMud);
                                        } else if (isActive) {
                                            curBlk.acts.push("✅ " + frota + textoImplemento); 
                                        } else {
                                            let txtStp = finalReason ? finalReason.replace("VENTO FORTE","EXCESSO DE VENTO") : "MOTIVO NÃO INFORMADO";
                                            curBlk.stps.push(frota + textoImplemento + " - " + txtStp + infoParada);
                                        }

                                        dr++;
                                    }
                                    
                                    if (curBlk.acts.length || curBlk.stps.length) {
                                        fData[name].blocks.push(curBlk);
                                    }
                                }
                            }
                        }
                    }

                    // A SUPERVISORA AUTÔNOMA (O SUCESSO DA FOTO CHUVA/TURNO)!
                    for (let key in fData) {
                        let f = fData[key];
                        
                        let hasActive = false;
                        let hasMismatchedTurno = false;
                        let hasMismatchedChuva = false;
                        let totalStps = 0; // Conta quantos tratores tem de fato parados
                        
                        for (let bl of f.blocks) {
                            if (bl.acts.length > 0) hasActive = true;
                            totalStps += bl.stps.length;
                            
                            for (let stp of bl.stps) {
                                let stpUpper = stp.toUpperCase();
                                
                                let isTurnoStp = safeIncludes(stpUpper, "TURNO S. OPERA") || safeIncludes(stpUpper, "TURNO SEM OPERA") || safeIncludes(stpUpper, "TURNO S OPERA");
                                if (!isTurnoStp) hasMismatchedTurno = true;
                                
                                let isChuvaStp = safeIncludes(stpUpper, "CHUVA") || safeIncludes(stpUpper, "UMIDO") || safeIncludes(stpUpper, "ÚMIDO");
                                if (!isChuvaStp) hasMismatchedChuva = true;
                            }
                        }

                        // O SEGREDO: Mesmo se o operador deixar o cabeçalho em branco, se TODOS os tratores da frente estiverem parados por Turno ou Chuva, a frente sobe!
                        let allTurno = (!hasActive && !hasMismatchedTurno && totalStps > 0);
                        let allChuva = (!hasActive && !hasMismatchedChuva && totalStps > 0);

                        if ((f.isTurno || allTurno) && !hasActive && !hasMismatchedTurno) {
                            frentesTurno.add(f.name);
                            f.skipPrint = true; 
                        } else if ((f.isChuva || allChuva) && !hasActive && !hasMismatchedChuva) {
                            frentesChuva.add(f.name);
                            f.skipPrint = true;
                        }
                    }

                    const order = ["HERBICIDA", "CULTIVO / Q LOMBO", "CULTIVO MINERAL", "CORTE SOQUEIRA", "SOQUEIRA", "COMPOSTO", "CORRETIVO", "VINHAÇA", "VINHACA", "LOCALIZADA", "TRANSP DE VINHAÇA"];
                    let sorted = Object.values(fData).sort((a,b) => {
                        let iA = order.findIndex(p => safeIncludes(a.name, p));
                        let iB = order.findIndex(p => safeIncludes(b.name, p));
                        if (iA !== iB) return (iA === -1 ? 99 : iA) - (iB === -1 ? 99 : iB);
                        return a.name.localeCompare(b.name, undefined, {numeric:true});
                    });

                    let txt = "*🚜 FRENTES TRATOS*\n";
                    let topBoxes = [];
                    
                    if (frentesTurno.size > 0) {
                        topBoxes.push("🚫 *FRENTES PARADAS POR TURNO SEM OPERAÇÃO*\n" + Array.from(frentesTurno).join("\n"));
                    }
                    
                    if (frentesChuva.size > 0) {
                        topBoxes.push("🌧️ *FRENTES PARADAS POR CHUVA / SOLO ÚMIDO*\n" + Array.from(frentesChuva).join("\n"));
                    }
                    
                    if (topBoxes.length > 0) {
                        txt += "\n" + topBoxes.join("\n\n") + "\n\n\n";
                    } else {
                        txt += "\n";
                    }

                    for (let f of sorted) {
                        if (f.skipPrint) continue; 
                        if (f.blocks.length === 0) continue; 
                        txt += "*" + f.name + "*\n";
                        f.blocks.sort((a,b) => b.acts.length - a.acts.length);
                        
                        for (let bl of f.blocks) {
                            
                            // A REGRA DO BEBEDOURO / N/A COM OS MÚLTIPLAS
                            let bVal = bl.b ? bl.b.toString().toUpperCase().trim() : "";
                            let isBlocoVazio = !bVal || bVal === "N/A" || bVal === "-" || bVal === "0" || bVal === "N" || bVal === "NA" || safeIncludes(["SJO", "AND", "CRZ", "TAN", "MAN", "VER"], bVal);

                            let osVal = bl.os ? bl.os.toString().toUpperCase().trim() : "";
                            let isOsVazia = !osVal || osVal === "N/A" || safeIncludes(osVal, "N/A") || safeIncludes(osVal, "NA") || safeIncludes(osVal, "N / A") || osVal === "-" || osVal === "0" || osVal === "N";

                            let isApenasLetras = bVal.length > 0 && !/\d/.test(bVal); 

                            if (isBlocoVazio && isOsVazia) {
                                txt += "*OS:* N/A\n";
                            } else if (isBlocoVazio && !isOsVazia) {
                                txt += "*BLOCO:* N/A / *OS:* " + bl.os + "\n"; // Restaura a palavra BLOCO
                            } else {
                                if (isOsVazia) {
                                    if (isApenasLetras) {
                                        txt += "*BLOCO:* " + bl.b + "\n"; 
                                    } else {
                                        txt += "*BLOCO:* " + bl.b + " / *OS:* N/A\n";
                                    }
                                } else {
                                    if (isApenasLetras && (safeIncludes(osVal, "N/A") || safeIncludes(osVal, "NA") || safeIncludes(osVal, "N / A"))) {
                                        txt += "*BLOCO:* " + bl.b + "\n";
                                    } else {
                                        txt += "*BLOCO:* " + bl.b + " / *OS:* " + bl.os + "\n";
                                    }
                                }
                            }

                            for (let a of bl.acts) {
                                let it = a;
                                if (safeIncludes(f.name, "HERBICIDA")) {
                                    let frotaPura = a.replace('✅ ', '').replace('✅', '').replace('🟡 ', '').replace('🟡', '').split(' - ')[0].trim();
                                    let r = await askHerbicidaType(frotaPura);
                                    if(r) it += " - " + r;
                                }
                                txt += it + "\n";
                            }
                            
                            if (bl.stps.length) { 
                                txt += "*🚨 PARADAS*\n"; 
                                bl.stps.forEach(s => txt += s + "\n"); 
                            }
                            txt += "\n";
                        }
                        txt += "\n";
                    }

                    let mud = await askDynamicForm('mudancas');
                    let cham = await askDynamicForm('chamados');
                    let obsCustom = await askObsForm();
                    
                    let obsFinalText = obsCustom ? "\n\n*OBS:*\n" + obsCustom : "";
                    let conOutput = Object.keys(cMap).length > 0 ? Object.values(cMap).join("\n") : "N/A";

                    document.getElementById('resultado').innerText = txt.trimEnd() + 
                    obsFinalText + 
                    "\n---------------------------------------------------------------------------------------------------------------------------------\n\n*CHAMADOS TECNOLOGIA: (geral para tratos)*\n" + 
                    (cham.length ? cham.join("\n") : "N/A") + 
                    "\n\n*CONECTIVIDADE: (equipamentos que estão sem enviar informação)*\n" + 
                    conOutput + 
                    "\n\n*MUDANÇA DE FRENTE: (feitas no turno)*\n" + 
                    (mud.length ? mud.join("\n") : "N/A");

                } catch (err) { 
                    document.getElementById('resultado').innerText = "Erro: " + err.message; 
                }
            }, 50);
        };
        reader.readAsArrayBuffer(file);
    }
    
    function copiarWhatsApp() { 
        navigator.clipboard.writeText(document.getElementById('resultado').innerText); 
        alert("Copiado para WhatsApp!"); 
    }
    
    function copiarTeams() {
        let t = document.getElementById('resultado').innerText.replace(/\*(.*?)\*/g, "<strong>$1</strong>").replace(/\n/g, "<br>");
        let d = document.createElement("div"); 
        d.innerHTML = t; 
        d.style.position = "fixed"; 
        d.style.left = "-9999px"; 
        document.body.appendChild(d);
        window.getSelection().selectAllChildren(d); 
        document.execCommand("copy"); 
        document.body.removeChild(d); 
        alert("Copiado para Teams!");
    }
</script>
</body>
</html>
